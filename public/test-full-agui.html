<!--
  Test harness: Full mode + ag-ui protocol.
  Used by Playwright tests to verify the persistent /stream connection and
  HITL card rendering work in Full mode (not just Bubble).
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowise Full Page Chat — ag-ui test harness</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #chat-container { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <flowise-fullchatbot id="chat-container"></flowise-fullchatbot>

    <script type="module">
        import Chatbot from './web.js';

        // Read optional overrides from URL query params so tests can
        // flip protocol / userId without editing this file.
        const params = new URLSearchParams(window.location.search);
        const protocol = params.get('protocol') ?? 'ag-ui';
        const userId = params.get('userId') ?? 'test-user';

        Chatbot.initFull({
            chatflowid: 'test-chatflow',
            apiHost: 'http://localhost:9091',
            protocol,
            apiPath: '/chat',
            agentId: 'test-agent',
            id: 'chat-container',
            chatflowConfig: {
                sessionId: `session_${Date.now()}`,
                vars: {
                    userId,
                    userToken: 'test-token',
                },
            },
            theme: {
                chatWindow: {
                    showTitle: true,
                    title: 'Test Full Page',
                    showWelcomeMessage: true,
                    welcomeMessage: 'test harness',
                },
            },
        });
    </script>
</body>

</html>
